version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: renfo_postgres
    environment:
      POSTGRES_USER: clashchat_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: clashchat
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: renfo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
